version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci):"
    groups:
      github-actions:
        patterns: ["*"]
  # Python uv
  - package-ecosystem: uv
    directory: /backend
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(backend):"
    groups:
      backend-minor-patch:
        update-types: ["minor", "patch"]
  # npm admin app
  - package-ecosystem: npm
    directory: "/frontend/admin"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(frontend):"
    ignore:
      # Pinned: upgrading regenerates the API client and breaks the
      # verify-client check until the client is regenerated and committed.
      - dependency-name: "@hey-api/openapi-ts"
    groups:
      playwright:
        patterns: ["@playwright/test"]
      frontend-minor-patch:
        update-types: ["minor", "patch"]
        exclude-patterns: ["@playwright/test"]
  # npm student app
  - package-ecosystem: npm
    directory: "/frontend/student"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(frontend):"
    ignore:
      # Pinned: upgrading regenerates the API client and breaks the
      # verify-client check until the client is regenerated and committed.
      - dependency-name: "@hey-api/openapi-ts"
    groups:
      playwright:
        patterns: ["@playwright/test"]
      frontend-minor-patch:
        update-types: ["minor", "patch"]
        exclude-patterns: ["@playwright/test"]
  # Docker
  - package-ecosystem: docker
    directories:
      - "/backend"
      - "/frontend/admin"
      - "/frontend/student"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(tools/docker):"
    groups:
      playwright:
        patterns: ["mcr.microsoft.com/playwright"]
  # Docker Compose
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(tools/docker):"
